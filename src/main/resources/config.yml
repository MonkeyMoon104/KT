# Core plugin settings only.
# Split files:
# - messages.yml: command and GUI messages
# - database.yml: database connection
# - economy.yml: currency and rewards
# - effects.yml: built-in effect settings
# - performance.yml: particle/FPS tuning
# - gui.yml: GUI layout and button labels
# - resource-pack.yml: resource pack and custom sounds
# - events.yml: lucky events
# - management.yml: cooldowns and management toggles
# - custom-effects.yml: custom effect permission defaults

config-version: "3.0.0"

server-info: false

disabled-worlds: []

auto-update:
  enabled: true
